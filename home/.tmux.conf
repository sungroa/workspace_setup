# Drastically increase scrollback buffer for debugging deep log trails.
set -g history-limit 999999

# C-b is not acceptable -- Vim uses it
unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind-key C-a last-window
bind-key m movew

# Start numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Rather than constraining window size to the maximum size of any client
# connected to the *session*, constrain window size to the maximum size of any
# client connected to *that window*.
# This is vital for pair-programming or multi-monitor setups where clients have differing resolutions.
setw -g aggressive-resize on

# Highlight active window
set-window-option -g window-status-current-style bg=red

# Enable vi mode for viewing
set-window-option -g mode-keys vi

# Use the hjkl to move between panes.
bind-key         k select-pane -U
bind-key         j select-pane -D
bind-key         h select-pane -L
bind-key         l select-pane -R

# Split panes using - and \.
bind-key         '\' split-window -h -c "#{pane_current_path}"
bind-key         '-' split-window -v -c "#{pane_current_path}"

# Make New Window come to the pane's current path, maintaining context hierarchy.
bind c new-window -c "#{pane_current_path}"

# Splits panes and makes a small 20% overlay window specifically for running ephemeral builds/tests.
bind-key 'z' split-window -p 20 -c "#{pane_current_path}"
bind-key 'Z' split-window -h -p 20 -c "#{pane_current_path}"

# Require EOF (Ctrl-D) to be pressed twice to exit shell, preventing accidental closures.
set-environment -g 'IGNOREEOF' 2

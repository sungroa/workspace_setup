name: Repository Validation

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  validate:
    name: Lint & Verify (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Run Gitleaks (Security Scan)
        if: matrix.os == 'ubuntu-latest'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Install Dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y shellcheck jq
        
      - name: Install Dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install shellcheck jq
        
      - name: Install Dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install jq
        
      - name: Run ShellCheck
        if: matrix.os != 'windows-latest'
        run: shellcheck *.sh
        
      - name: Run Syntax Check (bash -n)
        run: bash -n *.sh
        
      - name: Run Dry-Run Validation
        run: bash ./setup.sh --dry-run
